    <style>
        :root {
            --bg: #f5f7fa;
            --bg2: #ffffff;
            --ink: #2c3e50;
            --muted: #7f8c8d;
            --rule: #e1e8ed;
            --accent: #3498db;
            --accent2: #2ecc71;
            --danger: #e74c3c;
            --warning: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 8px;
        }

        header p {
            color: var(--muted);
            font-size: 1rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;

        .stat-card {

            font-size: 0.85rem;

        .input-section {

            border: 1px solid var(--rule);
        }

        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        #todoInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--rule);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            color: var(--ink);
        }

        #todoInput:focus {
            border-color: var(--accent);

        #todoInput::placeholder {
            color: var(--muted);

        .btn-add {
            padding: 14px 24px;
            background: var(--accent);
            color: white;
            border: none;

            white-space: nowrap;
        }

        .btn-add:hover {
            background: #2980b9;
            transform: translateY(-1px);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        .filters {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid var(--rule);
            background: var(--bg2);
            border-radius: 20px;
            font-size: 0.9rem;

            transition: all 0.2s;
            color: var(--muted);
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .filter-btn:hover:not(.active) {
            background: var(--bg);
        }

        .todo-list {
            background: var(--bg2);
            border-radius: 16px;
            padding: 8px;

            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 4px;
            transition: all 0.2s;
            gap: 12px;
        }

        .todo-item:hover {
            background: var(--bg);
        }

        .todo-item:last-child {
            margin-bottom: 0;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--muted);
        }

        .todo-item.completed .check-circle {
            background: var(--accent2);
            border-color: var(--accent2);
        }

        .todo-item.completed .check-circle::after {
            content: "✓";
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .check-circle {
            width: 24px;
            height: 24px;
            border: 2px solid var(--rule);
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .check-circle:hover {
            border-color: var(--accent2);

        .todo-text {
            flex: 1;
            font-size: 1rem;

        }

        .btn-delete {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--muted);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0;

        .todo-item:hover .btn-delete {
            opacity: 1;

            text-align: center;
            padding: 60px 20px;

            margin-bottom: 8px;

        .priority-select {
            padding: 14px 16px;
            border: 2px solid var(--rule);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            background: var(--bg2);
            color: var(--ink);
            cursor: pointer;
        }

        .priority-select:focus {
            border-color: var(--accent);

        .priority-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 8px;
        }

        .priority-high {
            background: #fdeaea;
            color: var(--danger);
        }

        .priority-medium {
            background: #fff3e0;
            color: var(--warning);
        }

        .priority-low {
            background: #e8f5e9;
            color: var(--accent2);
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            header h1 {
                font-size: 2rem;
            }

            .stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            .stat-card {
                padding: 12px 8px;
            }

            .stat-number {
                font-size: 1.4rem;
            }

            .input-row {
                flex-direction: column;
            }

            .btn-add {
                width: 100%;
            }

            .btn-delete {
                opacity: 1;
            }
        }

</head>
<body>
    <div class="container">
        <header>
            <h1>待办事项</h1>
            <p>高效管理你的每一天</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">全部</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingCount">0</div>
                <div class="stat-label">待完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">已完成</div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-row">
                <input type="text" id="todoInput" placeholder="添加新的待办事项..." maxlength="100">
                <select class="priority-select" id="prioritySelect">
                    <option value="low">低优先级</option>
                    <option value="medium" selected>中优先级</option>
                    <option value="high">高优先级</option>
                </select>
                <button class="btn-add" onclick="addTodo()">添加</button>
            </div>
            <div class="filters">
                <button class="filter-btn active" onclick="setFilter('all')">全部</button>
                <button class="filter-btn" onclick="setFilter('pending')">待完成</button>
                <button class="filter-btn" onclick="setFilter('completed')">已完成</button>
            </div>
        </div>

        <div class="todo-list" id="todoList">
            <div class="empty-state">
                <div class="empty-state-icon">📝</div>
                <h3>暂无待办事项</h3>
                <p>在上方输入框添加你的第一个任务吧</p>
            </div>
        </div>
    </div>

    <script>
        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        let currentFilter = 'all';

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('completedCount').textContent = completed;
        }

        function getPriorityClass(priority) {
            return 'priority-' + priority;
        }

        function getPriorityText(priority) {
            const map = { high: '高', medium: '中', low: '低' };
            return map[priority] || priority;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return '刚刚';
            if (minutes < 60) return minutes + '分钟前';
            if (hours < 24) return hours + '小时前';
            if (days < 7) return days + '天前';
            return date.toLocaleDateString('zh-CN');
        }

        function renderTodos() {
            const listEl = document.getElementById('todoList');
            let filtered = todos;

            if (currentFilter === 'pending') {
                filtered = todos.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filtered = todos.filter(t => t.completed);
            }

            if (filtered.length === 0) {
                const emptyMessages = {
                    all: { icon: '📝', title: '暂无待办事项', desc: '在上方输入框添加你的第一个任务吧' },
                    pending: { icon: '✅', title: '没有待完成的任务', desc: '太棒了！所有任务都已完成' },
                    completed: { icon: '🎯', title: '还没有完成的任务', desc: '完成任务后会显示在这里' }
                };
                const msg = emptyMessages[currentFilter];
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">${msg.icon}</div>
                        <h3>${msg.title}</h3>
                        <p>${msg.desc}</p>
                    </div>
                `;
                updateStats();
                return;
            }

            listEl.innerHTML = filtered.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
                    <div class="check-circle" onclick="toggleTodo('${todo.id}')"></div>
                    <div class="todo-text">
                        ${escapeHtml(todo.text)}
                        <span class="priority-badge ${getPriorityClass(todo.priority)}">${getPriorityText(todo.priority)}</span>
                    </div>
                    <div class="todo-date">${formatDate(todo.createdAt)}</div>
                    <button class="btn-delete" onclick="deleteTodo('${todo.id}')">×</button>
                </div>
            `).join('');

            updateStats();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const prioritySelect = document.getElementById('prioritySelect');
            const text = input.value.trim();

            if (!text) {
                input.style.borderColor = 'var(--danger)';
                setTimeout(() => {
                    input.style.borderColor = '';
                }, 1000);
                return;
            }

            const todo = {
                id: Date.now().toString(),
                text: text,
                completed: false,
                priority: prioritySelect.value,
                createdAt: new Date().toISOString()
            };

            todos.unshift(todo);
            saveTodos();
            renderTodos();
            input.value = '';
            input.focus();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
            }
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
            renderTodos();
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderTodos();
        }

        document.getElementById('todoInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTodo();
            }
        });

        renderTodos();
    </script>
</body>
</html>
